<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2874A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4F72;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield icon -->
  <path d="M10 8 L30 4 L50 8 L50 28 Q50 42 30 52 Q10 42 10 28 Z"
        fill="url(#shield-grad)" stroke="#1B4F72" stroke-width="1"/>
  <!-- Checkmark inside shield -->
  <polyline points="18,28 26,36 42,20" fill="none" stroke="#ffffff" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- VeriKYC wordmark -->
  <text x="62" y="26" font-family="'IBM Plex Mono', 'Courier New', monospace"
        font-size="22" font-weight="700" fill="#1B4F72" letter-spacing="-0.5">Veri</text>
  <text x="110" y="26" font-family="'IBM Plex Mono', 'Courier New', monospace"
        font-size="22" font-weight="700" fill="#D35400" letter-spacing="-0.5">KYC</text>
  <!-- Tagline -->
  <text x="62" y="44" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="9" fill="#2874A6" letter-spacing="1.5" font-weight="500">IDENTITY VERIFICATION</text>
</svg>
