services:
  - type: web
    name: verikyc-core
    runtime: node
    rootDir: core
    buildCommand: npm ci && npm run build
    releaseCommand: npm run migrate:deploy && npm run seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Neon — set in dashboard (sensitive)
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Cloudinary — set in dashboard (sensitive)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # JWT — set in dashboard (sensitive, min 32 random chars each)
      - key: ACCESS_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      # Service-to-service — set in dashboard (must match AI service)
      - key: INTERNAL_TOKEN
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      # Frontend — set in dashboard (your Vercel URL)
      - key: FRONTEND_ORIGIN
        sync: false
      # SMTP — Gmail App Password (set in dashboard, never commit real values)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Upstash Redis — rate-limiter backing store (set in dashboard)
      - key: UPSTASH_REDIS_URL
        sync: false
      # Brevo — transactional email for OTP. Sends over HTTPS via the
      # Transactional Email API, not SMTP — avoids Render's outbound SMTP
      # port block.
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      # Google Gemini — powers the conversational Agent Chat layer (set in
      # dashboard). Without this, free-text chat messages return a clear
      # "not configured" error; exact tool-name calls (e.g. the password
      # modal) are unaffected.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

  # AI service (Python/FastAPI) — moved here from Railway (trial expired).
  # Heavy ML libs (torch/tensorflow/deepface/easyocr) load lazily on first use
  # per route, so the service starts well within the free tier's memory limit.
  - type: web
    name: verikyc-ai
    runtime: docker
    rootDir: ai-service
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Must match core's INTERNAL_TOKEN exactly (set in dashboard)
      - key: INTERNAL_TOKEN
        sync: false
